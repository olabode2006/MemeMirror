<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeMirror - Facial Expression to Meme Matcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: #0b0f14;
            color: #e1e8ed;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.125rem;
            color: #8b95a1;
            font-weight: 400;
        }

        /* Main Card */
        .main-card {
            background: #1a1f26;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            margin-bottom: 24px;
            border: 1px solid #252b33;
        }

        /* Meme Display */
        .meme-display {
            width: 100%;
            min-height: 400px;
            background: #0f1419;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            overflow: hidden;
            position: relative;
        }

        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: #4a5568;
        }

        .placeholder svg {
            color: #2d3748;
        }

        .placeholder p {
            font-size: 1.125rem;
            font-weight: 500;
        }

        .meme-image {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            display: block;
        }

        .camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .camera-error {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #8b95a1;
            font-size: 1.125rem;
        }

        .camera-error p {
            text-align: center;
        }

        .image-placeholder {
            width: 100%;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .placeholder-content {
            text-align: center;
        }

        .placeholder-icon {
            font-size: 4rem;
            margin-bottom: 12px;
        }

        /* Meme Info */
        .meme-info {
            margin-top: 24px;
        }

        .meme-name {
            font-size: 1.875rem;
            font-weight: 700;
            color: #e1e8ed;
            margin-bottom: 24px;
            text-align: center;
        }

        /* Score Section */
        .score-section {
            background: #0f1419;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .score-label {
            font-size: 0.875rem;
            color: #8b95a1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .score-value {
            font-size: 3rem;
            font-weight: 800;
            color: #00d9ff;
            margin-bottom: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1a1f26;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff 0%, #00a8cc 100%);
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Debug Section */
        .debug-section {
            margin-top: 16px;
        }

        .debug-section summary {
            cursor: pointer;
            padding: 12px 16px;
            background: #0f1419;
            border-radius: 8px;
            font-weight: 600;
            color: #8b95a1;
            user-select: none;
            transition: all 0.2s ease;
        }

        .debug-section summary:hover {
            background: #1a1f26;
            color: #e1e8ed;
        }

        .debug-section[open] summary {
            margin-bottom: 12px;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .signals-container {
            padding: 16px;
            background: #0f1419;
            border-radius: 0 0 8px 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .signal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #1a1f26;
            border-radius: 6px;
        }

        .signal-name {
            color: #8b95a1;
            font-weight: 500;
            text-transform: capitalize;
        }

        .signal-value {
            color: #00d9ff;
            font-weight: 700;
            font-size: 1.125rem;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-icon {
            font-size: 1.25rem;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
            background: #2563eb;
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #1a1f26;
            color: #e1e8ed;
            border: 1px solid #252b33;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #252b33;
            border-color: #00d9ff;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .tone-dropdown {
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            background: #1a1f26;
            color: #e1e8ed;
            border: 1px solid #252b33;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
            min-width: 180px;
        }

        .tone-dropdown:hover {
            border-color: #00d9ff;
        }

        .tone-dropdown:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
        }

        /* Caption Card */
        .caption-card {
            background: #1a1f26;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid #252b33;
        }

        .caption-card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e1e8ed;
            margin-bottom: 20px;
        }

        .captions-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .caption-item {
            display: flex;
            gap: 16px;
            padding: 20px;
            background: #0f1419;
            border-radius: 12px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .caption-item:hover {
            background: #1a1f26;
            border-color: #00d9ff;
            transform: translateX(4px);
        }

        .caption-number {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #00d9ff 0%, #00a8cc 100%);
            color: white;
            font-weight: 700;
            border-radius: 8px;
            font-size: 0.875rem;
        }

        .caption-text {
            color: #e1e8ed;
            font-size: 1.063rem;
            line-height: 1.6;
        }

        /* Utility Classes */
        .hidden {
            display: none !important;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 32px 0;
            margin-top: 40px;
            color: #8b95a1;
            font-size: 0.938rem;
            border-top: 1px solid #252b33;
        }

        .footer p {
            margin: 0;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .main-card,
            .caption-card {
                padding: 24px;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .tone-dropdown {
                width: 100%;
            }

            .meme-display {
                min-height: 300px;
            }

            .score-value {
                font-size: 2.5rem;
            }

            .meme-name {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .title {
                font-size: 2rem;
            }

            .main-card,
            .caption-card {
                padding: 20px;
            }

            .btn {
                padding: 14px 24px;
                font-size: 0.938rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">MemeMirror</h1>
            <p class="subtitle">Make a face. We diagnose the meme.</p>
        </header>

        <div class="main-card">
            <div class="meme-display" id="memeDisplay">
                <video id="cameraFeed" class="camera-feed" autoplay playsinline></video>
                <div id="cameraError" class="camera-error hidden">
                    <p>📷 Camera access denied or unavailable</p>
                </div>
                <img id="memeImage" class="meme-image hidden" alt="Matched meme">
            </div>

            <div id="memeInfo" class="meme-info hidden">
                <h2 id="memeName" class="meme-name"></h2>

                <details class="debug-section">
                    <summary>Debug Signals</summary>
                    <div id="signalsContainer" class="signals-container"></div>
                </details>
            </div>
        </div>

        <div class="controls">
            <button id="analyzeBtn" class="btn btn-primary">
                <span class="btn-icon">🎭</span>
                Analyze
            </button>
        </div>

        <footer class="footer">
            <p>&copy; 2026 NGAChain. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // Meme database
        const memes = [
            {
                meme_id: "surprised_pikachu",
                meme_name: "Surprised Pikachu",
                image: "static/memes/surprised_pikachu.jpg",
                score: 0.85,
                signals: { mouth_open: 0.85, smile: 0.1 }
            },
            {
                meme_id: "big_smile",
                meme_name: "Big Smile",
                image: "static/memes/big_smile.jpg",
                score: 0.75,
                signals: { mouth_open: 0.2, smile: 0.9 }
            },
            {
                meme_id: "tired_face",
                meme_name: "Tired Face",
                image: "static/memes/tired_face.jpg",
                score: 0.55,
                signals: { mouth_open: 0.1, smile: 0.1 }
            }
        ];

        // Caption database
        const allCaptions = [
            "When you realize it's Monday tomorrow",
            "Me pretending to understand the meeting",
            "POV: You just remembered something embarrassing from 10 years ago",
            "When the code works but you don't know why",
            "My last brain cell trying to function",
            "When someone says 'we need to talk'",
            "Me after one compliment",
            "When you're too tired to sleep",
            "My mental health at 3am vs 3pm",
            "When you check your bank account after the weekend"
        ];

        // DOM elements
        const analyzeBtn = document.getElementById('analyzeBtn');
        const memeDisplay = document.getElementById('memeDisplay');
        const memeImage = document.getElementById('memeImage');
        const memeInfo = document.getElementById('memeInfo');
        const memeName = document.getElementById('memeName');
        const signalsContainer = document.getElementById('signalsContainer');
        const cameraFeed = document.getElementById('cameraFeed');
        const cameraError = document.getElementById('cameraError');

        let currentMeme = null;
        let stream = null;

        // Initialize camera
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' },
                    audio: false 
                });
                cameraFeed.srcObject = stream;
                cameraError.classList.add('hidden');
            } catch (error) {
                console.error('Camera access error:', error);
                cameraFeed.style.display = 'none';
                cameraError.classList.remove('hidden');
            }
        }

        // Start camera on page load
        initCamera();

        // Analyze button handler
        analyzeBtn.addEventListener('click', async () => {
            try {
                // Capture current frame from camera
                const canvas = document.createElement('canvas');
                canvas.width = cameraFeed.videoWidth;
                canvas.height = cameraFeed.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(cameraFeed, 0, 0);
                const imageData = canvas.toDataURL('image/jpeg');
                
                // Show loading state
                analyzeBtn.disabled = true;
                analyzeBtn.innerHTML = '<span class="btn-icon">⏳</span> Analyzing...';
                
                // Send to backend
                const response = await fetch('http://localhost:5001/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ image: imageData })
                });
                
                if (!response.ok) {
                    throw new Error('Analysis failed');
                }
                
                const data = await response.json();
                
                // Check if we got valid data
                if (!data || !data.meme_name) {
                    throw new Error('Invalid response from server');
                }
                
                // Hide camera feed
                cameraFeed.style.display = 'none';
                
                // Update meme image
                memeImage.src = data.image_url;
                memeImage.classList.remove('hidden');
                
                // Update meme info
                memeName.textContent = data.meme_name;
                
                // Update signals
                signalsContainer.innerHTML = '';
                if (data.signals) {
                    for (const [key, value] of Object.entries(data.signals)) {
                        const signalItem = document.createElement('div');
                        signalItem.className = 'signal-item';
                        signalItem.innerHTML = `
                            <span class="signal-name">${key.replace(/_/g, ' ')}</span>
                            <span class="signal-value">${(value * 100).toFixed(0)}%</span>
                        `;
                        signalsContainer.appendChild(signalItem);
                    }
                }
                
                // Show info section
                memeInfo.classList.remove('hidden');
                
                // Reset analyze button
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = '<span class="btn-icon">🎭</span> Analyze';
                
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to analyze expression. Make sure the backend is running.');
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = '<span class="btn-icon">🎭</span> Analyze';
            }
        });

        // Handle image load errors with placeholder
        memeImage.addEventListener('error', () => {
            memeImage.style.display = 'none';
            const errorPlaceholder = document.createElement('div');
            errorPlaceholder.className = 'image-placeholder';
            errorPlaceholder.innerHTML = `
                <div class="placeholder-content">
                    <div class="placeholder-icon">🖼️</div>
                    <p>${currentMeme.meme_name}</p>
                </div>
            `;
            memeDisplay.appendChild(errorPlaceholder);
        });
    </script>
</body>
</html>
